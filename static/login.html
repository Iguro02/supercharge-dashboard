<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperCharge SG — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #085041;
    --green-light: #E1F5EE;
    --text: #2C2C2A;
    --muted: #5F5E5A;
    --border: #D3D1C7;
    --bg: #F6F5F0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--green-dark);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    font-weight: 600;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--green-dark);
    line-height: 1.2;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 1rem;
    background: white;
  }

  input:focus { border-color: var(--green); }

  button {
    width: 100%;
    padding: 12px;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }

  button:hover { background: var(--green); }
  button:disabled { background: var(--border); cursor: not-allowed; }

  .error {
    background: #FFF0F0;
    border: 1px solid #F7C1C1;
    color: #A32D2D;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
  }

  .hint {
    margin-top: 1.5rem;
    padding: 12px;
    background: var(--green-light);
    border-radius: 8px;
    font-size: 12px;
    color: var(--green-dark);
    line-height: 1.6;
  }
  .hint strong { font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">SuperCharge SG</div>
      <div class="logo-sub">Energy Dashboard</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your energy dashboard</p>

  <div class="error" id="error-msg"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <button id="login-btn" onclick="doLogin()">Sign in</button>

  <div class="hint">
    <strong>Demo accounts:</strong><br>
    clientA@test.com / passwordA (Client A — 2 sites)<br>
    clientB@test.com / passwordB (Client B — 1 site)
  </div>
</div>

<script>
  // If already logged in, redirect
  if (localStorage.getItem('sc_token')) {
    window.location.href = '/index.html';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.detail || 'Login failed';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }

      localStorage.setItem('sc_token', data.access_token);
      localStorage.setItem('sc_email', email);
      window.location.href = '/index.html';
    } catch(e) {
      errEl.textContent = 'Network error — is the server running?';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }
</script>
</body>
</html>
